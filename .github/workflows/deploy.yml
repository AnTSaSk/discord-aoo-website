name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deployment even if no changes"
        required: false
        default: "false"

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Deploy to Docker Swarm
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          IMAGE_TAG: ${{ github.sha }}
          APP_NAME: ${{ vars.APP_NAME }}
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG,APP_NAME,APP_DOMAIN,GITHUB_REPOSITORY
          script: |
            # Convert repository name to lowercase (Docker requirement)
            IMAGE_NAME="${GITHUB_REPOSITORY,,}"

            # Pull the new image
            docker pull "ghcr.io/${IMAGE_NAME}:${IMAGE_TAG}"

            # Export variables for docker-compose
            export IMAGE_TAG="${IMAGE_TAG}"
            export APP_NAME="${APP_NAME}"
            export APP_DOMAIN="${APP_DOMAIN}"
            export GITHUB_REPOSITORY="${IMAGE_NAME}"

            # Deploy the stack
            docker stack deploy \
              --with-registry-auth \
              -c "/opt/stacks/${APP_NAME}/docker-compose.yml" \
              "${APP_NAME}"

            # Wait for deployment to start
            sleep 10

            # Verify deployment
            docker service ls --filter "name=${APP_NAME}"

      - name: Verify deployment
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Check service health (1 replica for static site)
            for i in {1..30}; do
              REPLICAS=$(docker service ls --filter name=${{ vars.APP_NAME }} --format "{{.Replicas}}")
              if [[ "$REPLICAS" == *"1/1"* ]]; then
                echo "Deployment successful: $REPLICAS"
                exit 0
              fi
              echo "Waiting for deployment... ($REPLICAS)"
              sleep 10
            done
            echo "Deployment timeout"
            exit 1

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Rolling back deployment..."
            docker service rollback ${{ vars.APP_NAME }}_website || true
